name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyCt7t7DE_cjAJiT_O6oTwz47eg-1uPLYP8"
          VITE_FIREBASE_AUTH_DOMAIN: "jastip-tiket.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "jastip-tiket"
          VITE_FIREBASE_STORAGE_BUCKET: "jastip-tiket.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "222734964578"
          VITE_FIREBASE_APP_ID: "1:222734964578:web:46a0cc421452540365fe3b"
          VITE_MIDTRANS_SNAP_URL: "https://app.sandbox.midtrans.com/snap/snap.js"
          VITE_MIDTRANS_CLIENT_KEY: "SB-Mid-client-demo"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
