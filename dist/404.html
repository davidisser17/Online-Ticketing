<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Concert Ticket Jastip</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Simpan path ke sessionStorage lalu redirect ke index.html
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var base = '/Online-Ticketing';
      // Strip base dari path
      var rest = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem(
        'ghpages_redirect',
        JSON.stringify({ path: rest, search: search, hash: hash })
      );
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
